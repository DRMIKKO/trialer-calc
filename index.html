<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trailer Tongue Weight Calculator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root{--bg:#0f0f10;--bg2:#18181b;--bg3:#222226;--bd:#2e2e34;--bd2:#3e3e46;--tx:#e8e8ec;--tx2:#9494a0;--tx3:#5c5c6a;--ac:#4f8ef7;--ok:#34d399;--ok-bg:#0d2e22;--wn:#fbbf24;--wn-bg:#2a1f00;--bad:#f87171;--bad-bg:#2a0d0d;--am:#f59e0b;--r:8px;--r2:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ── Responsive shell: stacked (portrait) → two-pane (landscape/wide) ── */
.app{display:flex;flex-direction:column}
.dash{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--bd)}
.dash-inner{max-width:680px;margin:0 auto;padding:.25rem 1rem .4rem}
.cargo-inner{max-width:680px;margin:0 auto;padding:.5rem 1rem 3rem}
.cog-btn{position:absolute;top:8px;left:8px;z-index:5;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx2);padding:.45rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,border-color .15s,background .15s}
.cog-btn:hover{color:var(--tx);border-color:var(--bd2);background:var(--bg3)}
.cog-btn:active{background:var(--bg)}
/* Tongue-weight + gross-trailer-weight bar pair (replaces the half-circle gauge) */
.bars{display:flex;flex-direction:column;gap:.55rem;padding:.55rem 0 .15rem}
.bar-wrap{position:relative}
.bar-track{height:14px;border-radius:7px;background:rgba(255,255,255,.07);overflow:hidden}
.bar-fill{height:100%;width:0;border-radius:7px;background:var(--ok);transition:width .35s,background .25s}
.bar-tick{position:absolute;top:-2px;left:50%;width:2px;height:18px;background:#fff;border-radius:1px;transform:translateX(-1px)}
.bar-meta{display:flex;justify-content:space-between;align-items:baseline;margin-top:.22rem;gap:.5rem}
.bar-lbl{font-size:.6rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em}
.bar-val{font-family:'DM Mono',monospace;font-size:.74rem;font-weight:600;color:var(--ok);white-space:nowrap}
.dgwrap{position:relative;padding:0 0 .25rem;background:var(--bg)}

@media (min-width:900px){
  .app{flex-direction:row;align-items:flex-start;max-width:1500px;margin:0 auto}
  /* Trailer/dashboard has PRIORITY: a comfortable capped width that doesn't grow. */
  .dash{flex:0 1 600px;max-width:620px;border-bottom:none;border-right:1px solid var(--bd)}
  .dash-inner{padding:.5rem 1rem 1rem}
  /* Cargo grid FILLS the remaining width — auto-fill adds/removes columns. */
  .cargo{flex:1 1 0;min-width:0}
  .cargo-inner{padding:.7rem 1rem 3rem;max-width:none}
}

/* ── Setup overlay ── */
.overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:flex-start;justify-content:center;background:rgba(0,0,0,.6);overflow-y:auto;padding:1.5rem 1rem 3rem}
.overlay[hidden]{display:none}
.overlay-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);width:100%;max-width:480px;margin:auto}
.overlay-hdr{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg2);border-radius:var(--r2) var(--r2) 0 0;z-index:1}
.overlay-title{font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2)}
.overlay-close{background:none;border:none;color:var(--tx2);font-size:1.05rem;cursor:pointer;line-height:1;padding:.25rem .45rem;border-radius:var(--r)}
.overlay-close:hover{color:var(--tx);background:var(--bg3)}
.overlay-body{padding:.2rem 1rem 1rem}
.sec{padding:.9rem 0 0}.sec+.sec{border-top:1px solid var(--bd);margin-top:.9rem}
.stitle{font-size:.63rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:.6rem}
.frow{display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem}
.frow label{font-size:.82rem;color:var(--tx2);flex:1;min-width:0}
.frow input[type=number]{width:72px;padding:.3rem .45rem;font-family:'DM Mono',monospace;font-size:.82rem;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);text-align:right;-moz-appearance:textfield;flex-shrink:0}
.frow input[type=number]:focus{outline:none;border-color:var(--ac)}
.frow input[type=number]::-webkit-outer-spin-button,.frow input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.funit{font-size:.68rem;color:var(--tx3);width:22px;flex-shrink:0}
.pos-readout{display:flex;align-items:baseline;gap:.5rem;margin:.2rem 0}
.pos-readout-val{font-family:'DM Mono',monospace;font-size:1.15rem;font-weight:500;color:var(--ok)}
.pos-readout-lbl{font-size:.7rem;color:var(--tx3)}

/* ── Cargo grid (container-responsive) ── */
.cargo-hdr{display:flex;justify-content:flex-start;align-items:center;margin-bottom:.45rem;gap:.5rem}
.cargo-toggles{display:flex;gap:.35rem}
.gtbtn{font-family:'DM Sans',sans-serif;font-size:.66rem;font-weight:500;color:var(--tx2);background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:.25rem .55rem;cursor:pointer;transition:color .15s,border-color .15s,background .15s;letter-spacing:.03em}
.gtbtn:hover{color:var(--tx);border-color:var(--bd2);background:var(--bg3)}
.gtbtn:active{background:var(--bg)}
.cargo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.3rem}
.ccell{position:relative;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:.28rem .36rem .3rem;transition:opacity .15s,border-color .15s,background .15s}
.ccell.off{opacity:.42}
.ccell.hl{border-color:var(--am);background:var(--bg3)}
.cname{display:block;width:100%;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;color:var(--tx);background:transparent;border:1px solid transparent;border-radius:5px;padding:.04rem .2rem;margin-bottom:.2rem;transition:border-color .15s,background .15s}
.cname:hover{border-color:var(--bd2)}.cname:focus{border-color:var(--ac);background:var(--bg3);outline:none}
.ccell-row{display:flex;align-items:center;justify-content:space-between}
.gchk{width:15px;height:15px;flex-shrink:0;accent-color:var(--am);cursor:pointer}
.cwt{width:54px;flex:none;padding:.08rem .28rem;font-family:'DM Mono',monospace;font-size:.7rem;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);text-align:right;-moz-appearance:textfield}
.cwt:focus{outline:none;border-color:var(--ac)}
.cwt::-webkit-outer-spin-button,.cwt::-webkit-inner-spin-button{-webkit-appearance:none}
.ccell-add{display:flex;align-items:center;justify-content:center;min-height:44px;background:none;border:1px dashed var(--bd2);border-radius:var(--r);color:var(--tx3);cursor:pointer;font-family:inherit;transition:color .15s,border-color .15s,background .15s}
.ccell-add:hover{color:var(--ok);border-color:var(--ok);background:var(--bg2)}
.ccell-add span{font-size:1.3rem;line-height:1;font-weight:300}
#savind{font-size:.6rem;color:var(--tx3);text-align:center;padding:.8rem 0 0;opacity:0;transition:opacity .4s}
#savind.show{opacity:1}

/* ── SVG drag affordances ── */
#svg [data-drag]{cursor:grab}
#svg [data-drag]:active{cursor:grabbing}
#svg.dragging,#svg.dragging *{cursor:grabbing !important}
/* Hover-link: cargo cell and its diagram dot subtly co-highlight */
#svg [data-gear-id]{transition:fill .15s,stroke .15s}
#svg [data-gear-id].hl{fill:#fbbf24;stroke:#fff;stroke-width:3}
</style>
</head>
<body>

<div class="app">
  <header class="dash">
    <div class="dash-inner">
      <div class="dgwrap">
        <button class="cog-btn" onclick="openSetup()" aria-label="Open setup" title="Setup">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <svg id="svg" width="100%" viewBox="46 12 600 224" role="img">
          <title>Trailer load diagram</title>
          <defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
        </svg>
      </div>
      <div class="bars">
        <div class="bar-row">
          <div class="bar-wrap"><div class="bar-track"><div class="bar-fill" id="tw-fill"></div></div><div class="bar-tick"></div></div>
          <div class="bar-meta"><span class="bar-lbl">Tongue weight</span><span class="bar-val" id="tw-val">&mdash;</span></div>
        </div>
        <div class="bar-row">
          <div class="bar-wrap"><div class="bar-track"><div class="bar-fill" id="gtw-fill"></div></div></div>
          <div class="bar-meta"><span class="bar-lbl">Gross trailer wt</span><span class="bar-val" id="gtw-val">&mdash;</span></div>
        </div>
      </div>
    </div>
  </header>

  <main class="cargo">
    <div class="cargo-inner">
      <div class="cargo-hdr">
        <div class="cargo-toggles">
          <button class="gtbtn" onclick="toggleAllGear(true)">All on</button>
          <button class="gtbtn" onclick="toggleAllGear(false)">All off</button>
        </div>
      </div>
      <div class="cargo-grid" id="glist"></div>
      <div id="savind">Saved</div>
    </div>
  </main>
</div>

<input type="hidden" id="nsl" value="57.5">

<!-- Setup overlay (behind the cog): car + trailer config -->
<div id="setup-overlay" class="overlay" hidden onclick="if(event.target===this)closeSetup()">
  <div class="overlay-card">
    <div class="overlay-hdr">
      <span class="overlay-title">Setup</span>
      <button class="overlay-close" onclick="closeSetup()" aria-label="Close setup">&#10005;</button>
    </div>
    <div class="overlay-body">
      <div class="sec" style="padding-top:.4rem">
        <div class="stitle">Race car weights</div>
        <div class="frow"><label>Front axle weight</label><input type="number" id="carFW" value="1980" step="5"><span class="funit">lbs</span></div>
        <div class="frow"><label>Rear axle weight</label><input type="number" id="carRW" value="1217" step="5"><span class="funit">lbs</span></div>
      </div>
      <div class="sec">
        <div class="stitle">Race car dimensions</div>
        <div class="frow"><label>Wheelbase</label><input type="number" id="wb" value="103.5" step="0.5"><span class="funit">in</span></div>
        <div class="frow"><label>Nose overhang (nose to front axle)</label><input type="number" id="no" value="39" step="0.5"><span class="funit">in</span></div>
        <div class="frow"><label>Tail overhang (rear axle to tail)</label><input type="number" id="to" value="38" step="0.5"><span class="funit">in</span></div>
      </div>
      <div class="sec">
        <div class="stitle">Trailer dimensions</div>
        <div class="frow"><label>Hitch to front of box</label><input type="number" id="h2b" value="44" step="0.5"><span class="funit">in</span></div>
        <div class="frow"><label>Front of box to front axle</label><input type="number" id="b2a" value="124" step="0.5"><span class="funit">in</span></div>
        <div class="frow"><label>Axle spread (center to center)</label><input type="number" id="asp" value="45.5" step="0.5"><span class="funit">in</span></div>
        <div class="frow"><label>Rear axle to rear of box</label><input type="number" id="a2e" value="72.5" step="0.5"><span class="funit">in</span></div>
        <div class="frow"><label>Trailer empty weight</label><input type="number" id="twt" value="2510" step="10"><span class="funit">lbs</span></div>
      </div>
      <div class="sec">
        <div class="stitle">Car position</div>
        <div class="pos-readout">
          <span class="pos-readout-val"><span id="nv">57.5</span>"</span>
          <span class="pos-readout-lbl">from front of box · drag the car in the diagram to change</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const LIM=600,WRN=540,GLIM=7715,SK='twc4';
const DG=[
  {id:'wheels', name:'Wheels\\Tires', wt:182,pos:12, posY:0, on:true},
  {id:'fuel',   name:'Fuel',          wt:120,pos:28, posY:38,on:true},
  {id:'ttires', name:'Trailer Tires', wt:20, pos:6,  posY:22,on:true},
  {id:'jack',   name:'Jack',          wt:40, pos:18, posY:0, on:true},
  {id:'tools',  name:'Tools',         wt:30, pos:40, posY:0, on:true},
  {id:'gen',    name:'Generator',     wt:100,pos:205,posY:0, on:true},
  {id:'pump',   name:'Tire pump',     wt:8,  pos:10, posY:40,on:true},
  {id:'spray',  name:'Water sprayer', wt:13, pos:55, posY:0, on:true},
  {id:'cooler', name:'Cooler',        wt:50, pos:215,posY:0, on:true},
  {id:'bench',  name:'Bench',         wt:20, pos:232,posY:0, on:true},
  {id:'table',  name:'Table',         wt:10, pos:236,posY:30,on:true},
  {id:'chairs', name:'Chairs',        wt:5,  pos:240,posY:30,on:true},
  {id:'skate',  name:'Skateboard',    wt:25, pos:100,posY:45,on:true},
  {id:'bike',   name:'Bike',          wt:50, pos:90, posY:50,on:true},
  {id:'jstands',name:'Jack Stands',   wt:0,  pos:121,posY:0, on:true},
  {id:'batt',   name:'Batteries',     wt:0,  pos:121,posY:0, on:true},
  {id:'bike2',  name:'Bike',          wt:50, pos:130,posY:0, on:true},
];
let gear=JSON.parse(JSON.stringify(DG));

function fv(id){const e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}

// ── Setup overlay ──
function openSetup(){
  document.getElementById('setup-overlay').hidden=false;
  document.body.style.overflow='hidden';
}
function closeSetup(){
  document.getElementById('setup-overlay').hidden=true;
  document.body.style.overflow='';
}

function toggleAllGear(state){
  gear.forEach(g=>{
    const ck=document.getElementById('ck_'+g.id);
    const card=document.getElementById('gc_'+g.id);
    if(ck){
      ck.checked=state;
      if(card)card.classList.toggle('off',!state);
    }
  });
  calc();
  qsave();
}

// ── Tongue-weight + gross-trailer-weight bars ──
// Both render as horizontal fill bars (consistent look). TW fills toward 2x
// target so the target sits at the 50% tick; teal under/at, red over. GTW
// fills toward the 7,715 lb limit.
function setBar(key,frac,color,text){
  const fill=document.getElementById(key+'-fill');
  const val=document.getElementById(key+'-val');
  if(fill){fill.style.width=(Math.min(Math.max(frac,0),1)*100).toFixed(1)+'%';fill.style.background=color;}
  if(val){val.textContent=text;val.style.color=color;}
}
function updateBars(tot,gtw){
  const TEAL='#34d399', RED='#ef4444', TARGET=LIM; // 600
  // Tongue weight
  const dev=tot-TARGET;
  const twOver=tot>TARGET, twOn=Math.abs(dev)<=1;
  const twColor=twOver?RED:TEAL;
  const twStatus=twOn?'ON TARGET':twOver?`+${Math.abs(dev)} lb over`:`\u2212${Math.abs(dev)} lb under`;
  setBar('tw', tot/(TARGET*2), twColor, `${tot} / ${TARGET} lb · ${twStatus}`);
  // Gross trailer weight
  const gFrac=gtw/GLIM, gOver=gtw>GLIM;
  const gColor=gOver?RED:TEAL;
  const gStatus=gOver?`+${(gtw-GLIM).toLocaleString()} lb over`:`${Math.round(gFrac*100)}%`;
  setBar('gtw', gFrac, gColor, `${gtw.toLocaleString()} / ${GLIM.toLocaleString()} lb · ${gStatus}`);
}

// ── Hover-link between cargo cells and diagram dots ─────────────
// Tracks which cargo item is being hovered (in either place) so the matching
// element in the other place can co-highlight. Persists across redraws.
let hoveredGearId=null;
function setGearHighlight(id){
  hoveredGearId=id;
  document.querySelectorAll('.ccell.hl').forEach(el=>el.classList.remove('hl'));
  document.querySelectorAll('#svg .hl').forEach(el=>el.classList.remove('hl'));
  if(id){
    document.getElementById('gc_'+id)?.classList.add('hl');
    document.querySelector(`#svg [data-gear-id="${id}"]`)?.classList.add('hl');
  }
}

let stimer=null;
function qsave(){clearTimeout(stimer);stimer=setTimeout(save,600);}
function save(){
  try{
    const st={
      h2b:fv('h2b'),b2a:fv('b2a'),asp:fv('asp'),a2e:fv('a2e'),twt:fv('twt'),
      carFW:fv('carFW'),carRW:fv('carRW'),wb:fv('wb'),no:fv('no'),to:fv('to'),
      nsl:parseFloat(document.getElementById('nsl').value),
      gear:gear.map(g=>({
        id:g.id,
        name:document.getElementById('nm_'+g.id)?.value??g.name,
        wt:parseFloat(document.getElementById('wt_'+g.id)?.value??g.wt),
        pos:g.pos,
        posY:g.posY||0,
        on:document.getElementById('ck_'+g.id)?.checked??g.on
      }))
    };
    localStorage.setItem(SK,JSON.stringify(st));
    const ind=document.getElementById('savind');
    ind.classList.add('show');setTimeout(()=>ind.classList.remove('show'),1200);
  }catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem(SK);if(!raw)return;
    const s=JSON.parse(raw);
    const sv=(id,v)=>{const e=document.getElementById(id);if(e&&v!=null)e.value=v;};
    sv('h2b',s.h2b);sv('b2a',s.b2a);sv('asp',s.asp);sv('a2e',s.a2e);sv('twt',s.twt);
    sv('carFW',s.carFW);sv('carRW',s.carRW);sv('wb',s.wb);sv('no',s.no);sv('to',s.to);
    if(s.nsl!=null){document.getElementById('nsl').value=s.nsl;document.getElementById('nv').textContent=parseFloat(s.nsl).toFixed(1);}
    // Stored cargo list is the source of truth (so custom adds AND deletes
    // persist). Fall back to defaults only when nothing is stored.
    if(Array.isArray(s.gear)){
      gear=s.gear.map(sg=>({
        id:sg.id, name:sg.name, wt:sg.wt, pos:sg.pos, posY:sg.posY||0, on:!!sg.on
      }));
    }
  }catch(e){}
}

function boxLen(){return fv('b2a')+fv('asp')+fv('a2e');}

function buildGear(){
  const c=document.getElementById('glist');c.innerHTML='';
  gear.forEach(g=>{
    const card=document.createElement('div');
    card.className='ccell'+(g.on?'':' off');card.id='gc_'+g.id;
    card.innerHTML=`
      <input type="text" class="cname" id="nm_${g.id}" value="${(g.name||'').replace(/"/g,'&quot;')}" placeholder="Item">
      <div class="ccell-row">
        <input type="checkbox" class="gchk" id="ck_${g.id}" ${g.on?'checked':''}>
        <input type="number" class="cwt" id="wt_${g.id}" value="${g.wt}" min="0" step="1">
      </div>`;
    c.appendChild(card);
    const ck=card.querySelector('#ck_'+g.id);
    const wt=card.querySelector('#wt_'+g.id);
    const nm=card.querySelector('#nm_'+g.id);
    ck.addEventListener('change',()=>{card.classList.toggle('off',!ck.checked);calc();qsave();});
    wt.addEventListener('input',()=>{calc();qsave();});
    nm.addEventListener('input',()=>{const it=gear.find(x=>x.id===g.id);if(it)it.name=nm.value;qsave();});
    card.addEventListener('mouseenter',()=>setGearHighlight(g.id));
    card.addEventListener('mouseleave',()=>setGearHighlight(null));
  });
  // ── "+" add tile ──
  const add=document.createElement('button');
  add.type='button';
  add.className='ccell-add';
  add.setAttribute('aria-label','Add cargo item');
  add.innerHTML='<span>+</span>';
  add.addEventListener('click',addCargo);
  c.appendChild(add);
}

function addCargo(){
  const id='c'+Date.now().toString(36);
  const mid=Math.round((boxLen()||242)/2);
  gear.push({id,name:'New item',wt:0,pos:mid,posY:0,on:true});
  buildGear();
  calc();
  qsave();
  const nm=document.getElementById('nm_'+id);
  if(nm){nm.focus();nm.select();}
}

function removeCargo(id){
  gear=gear.filter(g=>g.id!==id);
  if(hoveredGearId===id)hoveredGearId=null;
  buildGear();
  calc();
  qsave();
}

function calc(){
  try{
    const h2b=fv('h2b')||44,b2a=fv('b2a')||124,asp=fv('asp')||45.5;
    const a2e=fv('a2e')||72.5,twt=fv('twt')||2510;
    const cFW=fv('carFW')||1980,cRW=fv('carRW')||1217;
    const wb=fv('wb')||103.5,no=fv('no')||39,to=fv('to')||38;

    const bl=b2a+asp+a2e;
    const tFA=b2a,tRA=b2a+asp,amid=(tFA+tRA)/2,amH=h2b+amid;
    if(amH===0)return;

    const sl=document.getElementById('nsl');
    const carL=no+wb+to;
    const mx=Math.max(0,bl-carL-1);
    sl.max=mx.toFixed(1);
    if(parseFloat(sl.value)>mx)sl.value=mx;
    document.getElementById('nv').textContent=parseFloat(sl.value).toFixed(1);
    const nd=parseFloat(sl.value);

    const cFA=nd+no,cRA=cFA+wb,cTail=cRA+to;
    const cFAH=h2b+cFA,cRAH=h2b+cRA;
    const tc=bl-cTail;
    const cCG=(cFA*cFW+cRA*cRW)/(cFW+cRW);

    function tw(W,d){return W*(amH-d)/amH;}
    const twCar=tw(cFW,cFAH)+tw(cRW,cRAH);

    let twG=0,gWt=0;
    gear.forEach(g=>{
      const ck=document.getElementById('ck_'+g.id);
      // Clamp X to box length (if user dragged outside, or box shrank)
      if(g.pos>bl)g.pos=bl;
      if(g.pos<0)g.pos=0;
      if(!ck?.checked)return;
      const wt=parseFloat(document.getElementById('wt_'+g.id)?.value)||0;
      twG+=tw(wt,h2b+g.pos);gWt+=wt;
    });

    const twT=twt*0.10;
    const tot=Math.round(twCar+twG+twT);
    const gtw=Math.round(twt+cFW+cRW+gWt);
    const gtwFrac=gtw/GLIM;
    const gtwOver=gtw>GLIM;

    // TW hero gauge (GTW now renders as the ground-plane bar inside draw())
    updateBars(tot,gtw);
    // Combined load CG from front of box, derived from total tongue weight
    // vs. total weight (so it stays consistent with the TW the app shows).
    const loadCG=gtw>0?amH*(1-tot/gtw)-h2b:amid;

    draw({h2b,bl,tFA,tRA,amid,nd,cFA,cRA,cTail,no,wb,to,loadCG});
  }catch(e){console.error('calc error',e);}
}

// ── Silhouette asset cache ──
// Both SVGs share a coordinate system at 35.6653 SVG-units per inch.
const SIL={
  // Trailer file horizontal anchors (SVG units in its own viewBox)
  tCoupler:1703.44, tBoxFront:3287.44, tBoxRear:11918.44,
  tFAxle:7751.44, tRAxle:9389.44,
  // Trailer ARTWORK vertical bounds (extracted from actual path data — not viewBox)
  tArtTop:5154,      // y of trailer roof in SVG units
  tArtBottom:6310,   // y of wheel bottoms in SVG units (= ground reference)
  // Car file horizontal anchors
  cFAxle:2112.18, cRAxle:5838.33,
  // cTail: x of the visible rear bumper. Original handoff value was 7401
  // (path extent max); empirically the visible bumper sits left of that, so
  // tuned to 7100. Adjust +/-100 to shift visible rear position ~5 px.
  cNose:811, cTail:7100,
  // Car ARTWORK vertical bounds
  cArtTop:2453,
  // cArtBottom: y (in car-SVG units) anchored to the deck floor in the diagram.
  // SIGN CONVENTION: LARGER values move the car UP on screen, smaller = DOWN.
  // (The transform places this y at the deck floor; claim a higher bottom and
  // the real wheels end up above the deck.) S03: nudged 4650 -> 4750 (~5px up)
  // per request to lift the car slightly. Adjust +/-200 to nudge ~10px.
  cArtBottom:4750,
  unitsPerInch:35.6653,
  trailerEl:null, carEl:null, ready:false
};

async function loadSilhouettes(){
  try{
    const [tRes,cRes]=await Promise.all([
      fetch('trailer-silhouette.svg'),
      fetch('car-silhouette.svg')
    ]);
    const tTxt=await tRes.text(), cTxt=await cRes.text();
    const parser=new DOMParser();
    SIL.trailerEl=parser.parseFromString(tTxt,'image/svg+xml').documentElement;
    SIL.carEl=parser.parseFromString(cTxt,'image/svg+xml').documentElement;
    SIL.ready=true;
    calc(); // redraw once assets are available
  }catch(e){console.error('silhouette load failed',e);}
}

// Class → explicit attribute maps. Trailer and car files use the SAME class
// names (st1, st2, ...) for different things, so separate maps per file.
const TRAILER_CLASS_ATTRS={
  st0:{opacity:'.9'},
  st1:{fill:'none',stroke:'#1a1a1a','stroke-width':'.79','opacity':'.7'},
  st2:{fill:'none',stroke:'#1a1a1a','stroke-width':'.79','opacity':'.6'},
  st3:{fill:'none',stroke:'#5a6975','stroke-width':'.79','opacity':'.6'},
  st4:{fill:'none',stroke:'#888','stroke-width':'.4','opacity':'.3'},
  st6:{fill:'#3a4855'},
  st8:{fill:'#2a3845'},
  st9:{fill:'#1a1a1a'},
  st10:{display:'none'},
};
const CAR_CLASS_ATTRS={
  st0:{fill:'none','stroke-width':'0'},
  st1:{fill:'#fff',opacity:'.7'},
  st2:{fill:'#fff',opacity:'.19'},
  st3:{opacity:'.15'},
  st4:{opacity:'.45'},
};

function silInner(srcEl,classMap){
  const clone=srcEl.cloneNode(true);
  clone.querySelectorAll('#Dimensions, #Hidden, #Layer_2').forEach(n=>n.remove());
  clone.querySelectorAll('[class]').forEach(n=>{
    const classes=(n.getAttribute('class')||'').split(/\s+/);
    classes.forEach(c=>{
      const attrs=classMap[c];
      if(attrs)Object.keys(attrs).forEach(k=>{
        if(!n.hasAttribute(k))n.setAttribute(k,attrs[k]);
      });
    });
    n.removeAttribute('class');
  });
  clone.querySelectorAll('style').forEach(n=>n.remove());
  const fenderGroup=clone.querySelector('#fender-and-wheels');
  if(fenderGroup){
    fenderGroup.querySelectorAll('*').forEach(n=>{
      const f=n.getAttribute('fill');
      if(f==='#2a3845')n.setAttribute('fill','#1a2330');
      if(f==='#3a4855')n.setAttribute('fill','#2a3744');
    });
  }
  const boxBody=clone.querySelector('#box-body');
  if(boxBody){
    boxBody.querySelectorAll('rect').forEach(n=>{
      const f=n.getAttribute('fill');
      if(f==='#3a4855')n.setAttribute('fill','#4a5765');
    });
  }
  return Array.from(clone.childNodes).map(n=>{
    if(n.nodeType===Node.ELEMENT_NODE)return n.outerHTML;
    return '';
  }).join('');
}

// Shared view state for drag handlers — populated each time draw() runs.
const viewState={span:0,xL:50,xR:656,pxPerIn:0,gY:230,deckPx:0,bl:0,h2b:0,carL:0};

function draw(p){
  const svg=document.getElementById('svg');
  const xL=50,xR=656,span=p.h2b+p.bl+8;
  const sx=fh=>xL+(fh/span)*(xR-xL);
  const bx=fb=>sx(p.h2b+fb);
  const pxPerIn=(xR-xL)/span;
  const hx=sx(0);

  const gY=230;
  const boxHeightPx=84*pxPerIn;
  const deckPx=17*pxPerIn;
  const boxTopY=gY-deckPx-boxHeightPx;
  const labelY=boxTopY+(boxHeightPx*0.67);

  viewState.span=span; viewState.xL=xL; viewState.xR=xR;
  viewState.pxPerIn=pxPerIn; viewState.gY=gY; viewState.deckPx=deckPx;
  viewState.bl=p.bl; viewState.h2b=p.h2b; viewState.carL=p.no+p.wb+p.to;

  let h=`<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

  // ── Trailer silhouette ──
  if(SIL.ready){
    const tSpan=(SIL.tBoxRear-SIL.tCoupler);
    const tSpanReal=p.h2b+p.bl;
    const tScale=(tSpanReal*pxPerIn)/tSpan;
    const tDx=hx-(SIL.tCoupler*tScale);
    const tDy=gY-(SIL.tArtBottom*tScale);
    h+=`<g transform="translate(${tDx.toFixed(2)},${tDy.toFixed(2)}) scale(${tScale.toFixed(5)})">${silInner(SIL.trailerEl,TRAILER_CLASS_ATTRS)}</g>`;
  }else{
    h+=`<rect x="${bx(0)}" y="${boxTopY}" width="${bx(p.bl)-bx(0)}" height="${boxHeightPx}" rx="3" fill="#3d4a55" opacity="0.4"/>`;
  }

  // ── Car silhouette + invisible drag overlay ──
  if(SIL.ready){
    const cSpan=(SIL.cTail-SIL.cNose);
    const cSpanReal=p.no+p.wb+p.to;
    const cScale=(cSpanReal*pxPerIn)/cSpan;
    const carNosePx=bx(p.nd);
    const cDx=carNosePx-(SIL.cNose*cScale);
    const cDy=(gY-deckPx)-(SIL.cArtBottom*cScale);
    h+=`<g transform="translate(${cDx.toFixed(2)},${cDy.toFixed(2)}) scale(${cScale.toFixed(5)})">${silInner(SIL.carEl,CAR_CLASS_ATTRS)}</g>`;
    const carHeightPx=(SIL.cArtBottom-SIL.cArtTop)*cScale;
    const carTopY=(gY-deckPx)-carHeightPx;
    const carLeftPx=bx(p.nd);
    const carRightPx=bx(p.nd+cSpanReal);
    h+=`<rect data-drag="car" x="${carLeftPx.toFixed(1)}" y="${carTopY.toFixed(1)}" width="${(carRightPx-carLeftPx).toFixed(1)}" height="${(gY-deckPx-carTopY).toFixed(1)}" fill="transparent" stroke="none"/>`;
  }

  // ── Cargo dots — sized by weight (sqrt scaling so area ≈ weight).
  // Heaviest first so smaller dots render on top and stay clickable.
  const gearRadius=(wt)=>Math.min(30,Math.max(5,Math.sqrt(Math.max(0,wt))*1.98));
  const drawList=gear.filter(g=>document.getElementById('ck_'+g.id)?.checked).map(g=>{
    const wt=parseFloat(document.getElementById('wt_'+g.id)?.value)||0;
    return {g,wt,r:gearRadius(wt)};
  }).sort((a,b)=>b.wt-a.wt);
  drawList.forEach(({g,r})=>{
    const yOffset=(g.posY||0)*pxPerIn;
    const cy=(gY-deckPx)-r-yOffset;
    const hl=(g.id===hoveredGearId)?' hl':'';
    h+=`<circle data-drag="gear" data-gear-id="${g.id}" class="${hl.trim()}" cx="${bx(g.pos).toFixed(1)}" cy="${cy.toFixed(1)}" r="${r.toFixed(1)}" fill="#f59e0b" opacity="0.9" stroke="#0f0f10" stroke-width="1.5"/>`;
  });

  // ── Car CG marker (label at the top of the line) ──
  const cCG=(p.cFA*fv('carFW')+p.cRA*fv('carRW'))/(fv('carFW')+fv('carRW'));
  const cgx=bx(cCG);
  h+=`<line x1="${cgx}" y1="${boxTopY+10}" x2="${cgx}" y2="${gY-deckPx}" stroke="#34d399" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.85" pointer-events="none"/>`;
  h+=`<text x="${cgx+4}" y="${boxTopY+18}" text-anchor="start" font-size="9" font-weight="600" fill="#34d399" font-family="DM Sans,sans-serif" pointer-events="none">car CG</text>`;

  // ── Combined load CG (car + cargo + trailer) — solid teal, consistent with
  // the displayed tongue weight: position derived from total TW / total weight. ──
  if(p.loadCG!=null){
    const lx=bx(p.loadCG);
    h+=`<line x1="${lx}" y1="${boxTopY+10}" x2="${lx}" y2="${gY-deckPx}" stroke="#34d399" stroke-width="1.8" opacity="0.95" pointer-events="none"/>`;
    h+=`<text x="${lx+4}" y="${boxTopY+32}" text-anchor="start" font-size="9" font-weight="600" fill="#34d399" font-family="DM Sans,sans-serif" pointer-events="none">load CG</text>`;
  }

  // ── Nose gap annotation ──
  if(p.nd>2){
    const n1=bx(0),n2=bx(p.nd),ny=labelY+4;
    h+=`<line x1="${n1}" y1="${ny}" x2="${n2}" y2="${ny}" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar)" marker-start="url(#ar)" opacity="0.9" pointer-events="none"/>`;
    h+=`<text x="${(n1+n2)/2}" y="${ny-6}" text-anchor="middle" font-size="14" font-weight="600" fill="#f59e0b" font-family="DM Sans,sans-serif" pointer-events="none">${p.nd.toFixed(1)}"</text>`;
  }

  svg.innerHTML=h;
  svg.querySelectorAll('[data-gear-id]').forEach(el=>{
    const id=el.dataset.gearId;
    el.addEventListener('mouseenter',()=>setGearHighlight(id));
    el.addEventListener('mouseleave',()=>setGearHighlight(null));
  });
}

// ── Drag-to-position ─────────────────────────────────────────────
let dragState=null;
const snap=v=>Math.round(v*2)/2;

function getEvtPoint(e){
  const t=e.touches?e.touches[0]:e;
  return {clientX:t.clientX,clientY:t.clientY};
}
function svgCoords(e){
  const svg=document.getElementById('svg');
  const rect=svg.getBoundingClientRect();
  const {clientX,clientY}=getEvtPoint(e);
  return {
    x:((clientX-rect.left)/rect.width)*680,
    y:((clientY-rect.top)/rect.height)*260
  };
}

function dragStart(e){
  const target=e.target.closest('[data-drag]');
  if(!target)return;
  const type=target.dataset.drag;
  const {x,y}=svgCoords(e);
  if(type==='gear'){
    const id=target.dataset.gearId;
    const g=gear.find(it=>it.id===id);
    if(!g)return;
    dragState={type,id,startX:x,startY:y,startPos:g.pos,startPosY:g.posY||0};
  }else if(type==='car'){
    const nd=parseFloat(document.getElementById('nsl').value)||0;
    dragState={type,startX:x,startY:y,startNd:nd};
  }
  e.preventDefault();
  document.getElementById('svg').classList.add('dragging');
}

function dragMove(e){
  if(!dragState)return;
  e.preventDefault();
  const {x,y}=svgCoords(e);
  const dx=x-dragState.startX;
  const dy=y-dragState.startY;
  const dInchX=dx*viewState.span/(viewState.xR-viewState.xL);
  const dInchY=-dy/viewState.pxPerIn;
  if(dragState.type==='gear'){
    const g=gear.find(it=>it.id===dragState.id);
    if(!g)return;
    g.pos=Math.max(0,Math.min(viewState.bl,snap(dragState.startPos+dInchX)));
    g.posY=Math.max(0,Math.min(82,snap(dragState.startPosY+dInchY)));
  }else if(dragState.type==='car'){
    const maxNd=Math.max(0,viewState.bl-viewState.carL-1);
    const newNd=Math.max(0,Math.min(maxNd,snap(dragState.startNd+dInchX)));
    const nsl=document.getElementById('nsl');
    nsl.value=newNd;
    document.getElementById('nv').textContent=newNd.toFixed(1);
  }
  calc();
}

function dragEnd(){
  if(!dragState)return;
  dragState=null;
  document.getElementById('svg').classList.remove('dragging');
  qsave();
}

function attachDragHandlers(){
  const svg=document.getElementById('svg');
  svg.addEventListener('mousedown',dragStart);
  svg.addEventListener('touchstart',dragStart,{passive:false});
  window.addEventListener('mousemove',dragMove);
  window.addEventListener('touchmove',dragMove,{passive:false});
  window.addEventListener('mouseup',dragEnd);
  window.addEventListener('touchend',dragEnd);
  window.addEventListener('touchcancel',dragEnd);
}

function wire(){
  document.querySelectorAll('input[type=number]').forEach(el=>el.addEventListener('input',()=>{calc();qsave();}));
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&!document.getElementById('setup-overlay').hidden)closeSetup();
  });
}

document.addEventListener('DOMContentLoaded',()=>{
  load();buildGear();wire();calc();
  loadSilhouettes();
  attachDragHandlers();
});
</script>
